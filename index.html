<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>University Transcript Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px;
color:white;

background-image:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1");

background-size:cover;
background-position:center;
}

.container{
width:1200px;
max-width:100%;
background:rgba(15,23,42,0.9);
padding:30px;
border-radius:15px;
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h1{
text-align:center;
margin-bottom:20px;
}

.info{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:20px;
}

.info input{
padding:10px;
border:none;
border-radius:6px;
width:200px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #334155;
text-align:center;
}

th{
background:#020617;
}

input{
padding:5px;
border-radius:4px;
border:none;
text-align:center;
}

.module{
width:150px;
}

.coef{
width:60px;
}

.grade{
width:70px;
}

select{
padding:5px;
border-radius:4px;
border:none;
}

button{
padding:12px 25px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
background:#22c55e;
color:white;
font-size:16px;
}

button:hover{
background:#16a34a;
}

.controls{
text-align:center;
margin-top:20px;
}

#result{
margin-top:20px;
text-align:center;
font-size:24px;
padding:15px;
border-radius:8px;
}

.success{
background:#14532d;
color:#4ade80;
}

.fail{
background:#7f1d1d;
color:#f87171;
}

</style>
</head>

<body>

<div class="container" id="transcript">

<h1>🎓حساب المعدل الجامعي إنجليزية </h1>

<div class="info">
<input id="student" placeholder="Student Name">
<input id="field" placeholder="Field of Study">
</div>

<table>

<tr>
<th>Module</th>
<th>Coef</th>
<th>Exam</th>
<th>TD</th>
<th>Type</th>
<th>Average</th>
</tr>

<tbody id="tableBody"></tbody>

</table>

<div class="controls">

<button onclick="addModule()">Add Module</button>

<button onclick="calculate()">Calculate Average</button>

<button onclick="downloadPDF()">Download PDF</button>

</div>

<div id="result"></div>

</div>

<script>

let moduleCount = 0;

function addModule(){

moduleCount++;

let row = document.createElement("tr");

row.innerHTML=`

<td><input class="module" placeholder="Module name"></td>

<td><input class="coef" type="number" min="1" value="1"></td>

<td><input class="grade exam"></td>

<td><input class="grade td"></td>

<td>
<select>
<option value="normal">Exam+TD</option>
<option value="td">TD Only</option>
</select>
</td>

<td class="avg"></td>

`;

document.getElementById("tableBody").appendChild(row);

}

for(let i=0;i<6;i++) addModule();

function calculate(){

let rows=document.querySelectorAll("#tableBody tr");

let total=0;
let totalCoef=0;

rows.forEach(row=>{

let coef=parseFloat(row.querySelector(".coef").value)||0;

let exam=parseFloat(row.querySelector(".exam").value)||0;

let td=parseFloat(row.querySelector(".td").value)||0;

let type=row.querySelector("select").value;

let avg= type==="normal" ? exam*0.6 + td*0.4 : td;

row.querySelector(".avg").innerText=avg.toFixed(2);

total+=avg*coef;

totalCoef+=coef;

});

let finalAverage = totalCoef ? total/totalCoef : 0;

let result=document.getElementById("result");

if(finalAverage>=10){

result.className="success";

result.innerHTML="🎉 Final Average : "+finalAverage.toFixed(2)+"<br>PASSED";

}else{

result.className="fail";

result.innerHTML="Final Average : "+finalAverage.toFixed(2)+"<br>FAILED";

}

}

function downloadPDF(){

const element=document.getElementById("transcript");

html2pdf().from(element).set({

margin:0.5,

filename:'Transcript.pdf',

image:{type:'jpeg',quality:0.98},

html2canvas:{scale:2},

jsPDF:{unit:'in',format:'a4',orientation:'portrait'}

}).save();

}

</script>

</body>
</html>
